<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensaje</title>
<style>
body {
  background: #000;
  color: #fff;
  font-family: Georgia, serif;
  font-size: 28px;
  line-height: 1.8;
  padding: 60px 20px;
  text-align: center;
  max-width: 600px;
  margin: 0 auto;
}
p {
  margin: 30px 0;
}
.rose {
  font-size: 80px;
  margin: 50px 0;
}
.firma {
  margin-top: 60px;
  font-size: 22px;
  opacity: 0.9;
}
.headphones {
  font-size: 40px;
  margin-top: 80px;
  opacity: 0.6;
  cursor: pointer;
}
</style>
</head>
<body>

<p>Yo también pensé en ti.</p>

<p class="rose">🥀</p>

<p class="firma">Con cariño, tu 61.</p>

<p class="headphones" onclick="document.getElementById('musica').play();">🎧</p>

<audio id="musica" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_4d3d0d6e5a.mp3" type="audio/mpeg">
</audio>

<script>
var audio = document.getElementById('musica');
audio.volume = 0.07;

// Autoplay versuchen
document.body.addEventListener('click', function() {
  audio.play();
}, { once: true });
</script>

</body>
</html>
