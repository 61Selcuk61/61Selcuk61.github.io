<title>Selcuk Kirci</title>
<style>
body {
  background: black;
  color: white;
  font-family: Georgia, serif;
  font-size: 32px;
  text-align: center;
  padding: 50px 20px;
  margin: 0;
}
p {
  margin: 30px 0;
}
.rose {
  font-size: 80px;
  margin: 50px 0;
}
.firma {
  margin-top: 60px;
  font-size: 22px;
  opacity: 0.9;
}
.headphones {
  font-size: 50px;
  margin-top: 100px;
  cursor: pointer;
}
.hint {
  font-size: 16px;
  opacity: 0.4;
  margin-top: 10px;
}
</style>
</head>
<body>

<p>Yo también pensé en ti.</p>

<p class="rose">🥀</p>

<p class="firma">Con cariño, tu 61.</p>

<p class="headphones" onclick="playMusic()">🎧</p>
<p class="hint">Toca aquí</p>

<audio id="musica" loop autoplay>
  <source src="Sen Anlat Karadeniz - Gitme Kal V3 (Vokal Versiyon).opus" type="audio/ogg">
</audio>

<script>
var audio = document.getElementById('musica');
audio.volume = 0.07;

function playMusic() {
  audio.play().catch(function(){});
}

// Autoplay beim Laden versuchen; wenn blockiert, erst nach Interaktion
window.addEventListener('load', function() {
  var p = audio.play();
  if (p !== undefined) {
    p.catch(function() {
      // Autoplay wurde blockiert – dann startet es beim Klick auf 🎧 / Seite
    });
  }
});
</script>

</body>
