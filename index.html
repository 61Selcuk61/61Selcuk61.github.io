<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensaje</title>
<style>
body {
  background: #000;
  color: #fff;
  font-family: Georgia, serif;
  font-size: 28px;
  line-height: 1.8;
  padding: 60px 20px;
  text-align: center;
  max-width: 600px;
  margin: 0 auto;
}
p {
  margin: 30px 0;
}
.rose {
  font-size: 80px;
  margin: 50px 0;
}
.firma {
  margin-top: 60px;
  font-size: 22px;
  opacity: 0.9;
}
.hint {
  font-size: 16px;
  opacity: 0.3;
  margin-top: 80px;
}
</style>
</head>
<body>

<p>Yo también pensé en ti.</p>

<p class="rose">🥀</p>

<p class="firma">Con cariño, tu 61.</p>

<p class="hint">🎧</p>

<audio id="musica" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_4d3d0d6e5a.mp3" type="audio/mpeg">
</audio>

<form id="ping" action="https://formspree.io/f/xreypnvd" method="POST" style="display:none;">
  <input type="hidden" name="timestamp" value="">
</form>

<script>
// Musik starten bei erstem Klick/Touch
document.body.addEventListener('click', function() {
  var audio = document.getElementById('musica');
  audio.volume = 0.07;
  audio.play();
}, { once: true });

// Ping automatisch senden beim Laden
window.addEventListener('load', function() {
  document.getElementById('ping').submit();
});
</script>

</body>
</html>
